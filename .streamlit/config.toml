[theme]
base                     = "dark"
backgroundColor          = "#0a0f1e"
secondaryBackgroundColor = "#111827"
primaryColor             = "#6366f1"
textColor                = "#f1f5f9"
font                     = "sans serif"

[server]
headless             = true
enableCORS           = false
enableXsrfProtection = false
maxUploadSize        = 50

[browser]
gatherUsageStats = false
